<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marcopolo São Mateus - Consulta de Peças</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo-area">
                <div class="logo-icon">
                    <svg viewBox="0 0 40 40" fill="none">
                        <rect width="40" height="40" rx="6" fill="#003C78"/>
                        <path d="M8 20h24M20 8v24M12 12l16 16M28 12L12 28" stroke="#F47920" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </div>
                <div class="logo-text">
                    <h1>MARCOPOLO</h1>
                    <span>VEÍCULOS SÃO MATEUS - CONSULTA DE PEÇAS</span>
                </div>
            </div>
            <div class="search-area">
                <input type="text" id="searchInput" placeholder="Buscar por código ou nome da peça..." autocomplete="off">
                <button id="scanButton" class="scan-btn" title="Escanear Código">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 7V5a2 2 0 0 1 2-2h2"></path>
                        <path d="M17 3h2a2 2 0 0 1 2 2v2"></path>
                        <path d="M21 17v2a2 2 0 0 1-2 2h-2"></path>
                        <path d="M7 21H5a2 2 0 0 1-2-2v-2"></path>
                        <line x1="8" y1="12" x2="16" y2="12"></line>
                        <line x1="12" y1="8" x2="12" y2="16"></line>
                    </svg>
                </button>
            </div>
            <nav class="nav-links">
                <a href="index.html" class="nav-btn active">INÍCIO</a>
                <a href="controle.html" class="nav-btn">CONTROLE</a>
            </nav>
        </div>
    </header>

    <nav class="breadcrumb" id="breadcrumb">
        <a href="#" onclick="navegarPara('home')">INÍCIO</a>
    </nav>

    <main class="main-content" id="mainContent">
        <div class="loading-inicial">Carregando peças...</div>
    </main>

    <div class="modal" id="modal" onclick="if(event.target===this)fecharModal()">
        <div class="modal-content">
            <button class="modal-close" onclick="fecharModal()">&times;</button>
            <img id="modalImage" src="" alt="">
            <div class="modal-info">
                <h2 id="modalNome"></h2>
                <p id="modalCodigo"></p>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>MARCOPOLO S.A. - Unidade Veículos São Mateus</p>
        <p class="footer-sub">Sistema de Consulta de Peças - Uso Interno</p>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="firebase-config.js"></script>
    <script src="app.js"></script>
    
    <!-- Modal do Scanner -->
    <div id="scannerModal" class="modal-scanner">
        <div class="scanner-container">
            <div class="scanner-header">
                <h3>ESCANEAR CÓDIGO</h3>
                <button onclick="fecharScanner()" class="close-scanner">&times;</button>
            </div>
            <div id="reader"></div>
            <div class="scanner-footer">
                <p>Mire o código da peça na área central</p>
            </div>
        </div>
    </div>
</body>
</html>
